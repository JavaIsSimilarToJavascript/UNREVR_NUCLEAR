<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>퀴리의 방사선 피하기</title>
  <style>
    :root { color-scheme: dark; --ink:#c9f7d6; --panel:#0a1416dd; --line:#4cae78; --yellow:#ffe679; }
    *{box-sizing:border-box} body{margin:0;min-height:100vh;background:#050b0c;font-family:Consolas,"Malgun Gothic",monospace;color:var(--ink);display:grid;place-items:center;overflow:hidden}
    #shell{width:min(1100px,100vw);height:min(740px,100vh);position:relative;border:1px solid #355b4e;box-shadow:0 0 42px #16835a44;background:#071011;overflow:hidden}
    canvas{width:100%;height:100%;display:block;image-rendering:pixelated}
    #hud{position:absolute;inset:0;pointer-events:none;padding:18px;display:flex;justify-content:space-between;font-size:13px;text-shadow:0 2px #000}
    .left,.right{display:flex;flex-direction:column;gap:8px}.right{text-align:right;align-items:flex-end}.bar{width:240px;height:12px;background:#172326;border:1px solid #5b7d72}.fill{height:100%;transition:width .15s}.exposure{background:linear-gradient(90deg,#f2db54,#ff633f)}.health{background:#66d776}.xp{background:#69aaf6}.label{font-size:11px;color:#b6d0c0;letter-spacing:1px}.stat{background:#081416c9;border-left:2px solid var(--line);padding:7px 10px}
    #tip{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);max-width:760px;text-align:center;background:#071113e8;border:1px solid #415b50;padding:9px 14px;font-size:12px;color:#dbe7c5;pointer-events:none}#controls{position:absolute;bottom:16px;left:16px;background:#071113e8;border:1px solid #415b50;padding:8px 10px;font-size:11px;line-height:1.55;color:#c9e5cf;pointer-events:none}.controls-key{color:#fff0a0}
    #modal{position:absolute;inset:0;background:#03090bdc;display:grid;place-items:center;padding:20px}.card{width:min(650px,100%);border:1px solid #6ec88d;background:#0b1719f2;box-shadow:0 0 35px #43d37a28;padding:30px;text-align:center}.card h1{margin:0 0 8px;font-size:clamp(26px,4vw,43px);color:#f1f5d1;letter-spacing:2px}.card h2{margin:0 0 16px;color:#9bf0ba}.card p{line-height:1.7;color:#bdd0c3}.keys{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:18px 0}.key{border:1px solid #5b8b6a;background:#10271f;padding:6px 10px;color:#e9f8db}.button{font:inherit;font-weight:bold;letter-spacing:1px;color:#082214;background:#a9f2b9;border:0;padding:13px 22px;cursor:pointer}.button:hover{background:#e0ffc5}.options{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}.upgrade{min-height:130px;border:1px solid #4f9270;background:#0e211f;color:#dcf7d6;padding:16px;cursor:pointer;text-align:left;font:inherit}.upgrade:hover{outline:2px solid #c4f7a4;background:#17352b}.upgrade strong{display:block;color:#fff5a0;margin-bottom:8px;font-size:16px}.small{font-size:12px;color:#9bb7a8}.hidden{display:none!important}@media(max-width:620px){#hud{padding:10px;font-size:11px}.bar{width:160px}.options{grid-template-columns:1fr}.upgrade{min-height:auto}#tip{bottom:8px;font-size:10px;width:92%}}
  </style>
</head>
<body>
<main id="shell">
  <canvas id="game" width="1100" height="740"></canvas>
  <div id="hud" class="hidden"><div class="left"><div class="stat"><span class="label">피폭 게이지</span><div class="bar"><div id="exposure" class="fill exposure"></div></div></div><div class="stat"><span class="label">체력</span><div class="bar"><div id="health" class="fill health"></div></div></div><div class="stat"><span class="label">연구 경험치</span><div class="bar"><div id="xp" class="fill xp"></div></div></div></div><div class="right"><div id="time" class="stat">00:00</div><div id="level" class="stat">연구 레벨 1</div><div id="score" class="stat">점수 0</div><div id="items" class="stat">자료 0 · 차폐 없음</div></div></div>
  <div id="controls"><span class="controls-key">WASD</span> 이동 · <span class="controls-key">SHIFT</span> 대시 · <span class="controls-key">E</span> 자료 수집</div><div id="tip"></div>
  <div id="modal"><section class="card" id="startCard"><h1>퀴리의 방사선 피하기</h1><h2>CURIE'S RADIATION SURVIVAL</h2><p>어두운 연구실에서 방사선을 피하며 자료를 수집하세요.<br>피폭 게이지가 100%가 되기 전에 가능한 오래 연구를 이어가야 합니다.</p><div class="keys"><span class="key">WASD 이동</span><span class="key">SHIFT 대시</span><span class="key">E 자료 획득</span></div><button class="button" id="start">연구 시작</button><p class="small">알파선은 종이벽에 막히며, 감마선은 납 차폐판으로 피해를 줄일 수 있습니다.</p></section><section class="card hidden" id="upgradeCard"><h2>연구 성과 발견!</h2><p>다음 연구 중 하나를 선택하세요.</p><div id="options" class="options"></div></section><section class="card hidden" id="gameoverCard"><h1>연구 종료</h1><h2 id="cause"></h2><p id="summary"></p><button class="button" id="restart">다시 연구하기</button></section></div>
</main>
<script>
(() => {
  const c=document.querySelector('#game'),x=c.getContext('2d'),W=c.width,H=c.height;
  const hud=document.querySelector('#hud'), modal=document.querySelector('#modal'), startCard=document.querySelector('#startCard'), upgradeCard=document.querySelector('#upgradeCard'), overCard=document.querySelector('#gameoverCard');
  const ui={exposure:$('#exposure'),health:$('#health'),xp:$('#xp'),time:$('#time'),level:$('#level'),score:$('#score'),items:$('#items'),tip:$('#tip')}; function $(q){return document.querySelector(q)}
  const keys={}; addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key==='Enter'&&g?.p?.trapped>0){g.p.escapeHits++;if(g.p.escapeHits>=10)g.p.trapped=0;e.preventDefault()}if(['w','a','s','d','e','shift'].includes(e.key.toLowerCase()))e.preventDefault()});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
  let g, last=0, state='start', selectedMode='beginner';
  const tips=['알파선은 종이 한 장으로도 대부분 차단됩니다.','감마선은 투과력이 높아 납 같은 고밀도 물질로 차폐합니다.','방사선 안전의 기본: 시간은 짧게, 거리는 멀게, 차폐는 충분하게 (ALARA).'];
  const upgrades=[
    ['가벼운 발걸음','이동 속도 +15%',g=>g.p.speed*=1.15],['피폭 저항','받는 피폭량 -20%',g=>g.p.resist+=.2],['신속한 대시','대시 쿨타임 -30% (최대 2회)',g=>{g.p.dashCd*=.7;g.p.dashCdPicks++}],['납 차폐 생성','감마선 피해 -55% (30초)',g=>g.shield=30],['연구 효율','획득 경험치 +35%',g=>g.p.eff*=1.35],['요오드 정제','피폭 게이지 24% 감소',g=>g.p.exposure=Math.max(0,g.p.exposure-24)],['트랩 무시권','다음 트랩 1회 무효화',g=>g.p.trapPass++],['원격 집게','자료 획득 범위 +35%',g=>g.p.collectRange*=1.35],['추진 장치','대시 속도 +20%',g=>g.p.dashPower*=1.2],['납 유리','감마선 피폭 -25%',g=>g.p.gammaResist=Math.min(.75,g.p.gammaResist+.25)],['유도 교란기','유도 방사선 회전력 -35%',g=>g.p.homingResist=Math.min(.75,g.p.homingResist+.35)]
  ];
  function reset(){let hard=selectedMode==='veteran';g={t:0,spawn:0,itemSpawn:0,items:[],rays:[],traps:[],bosses:[],bursts:[],upgradeCount:0,bossLevel:0,walls:makeWalls(0),shield:0,tip:0,mapTimer:35,mapPhase:0,mapNotice:0,trapNotice:0,trapPassNotice:0,bossNotice:0,trapTimer:7,mode:selectedMode,spawnRate:hard?1.45:.70,damageRate:hard?1.30:.70,p:{x:W/2,y:H/2,r:13,speed:190,exposure:0,xp:0,totalXp:0,need:55,lvl:1,resist:0,armor:0,eff:1,dash:0,dashCd:2.1,dashCdPicks:0,dashing:0,dashPower:3.3,dashId:0,data:0,collectRange:42,trapPass:0,gammaResist:0,homingResist:0,trapped:0,escapeHits:0}}}
  function makeWalls(phase){let layouts=[[{x:170,y:180,w:205,h:18},{x:680,y:145,w:22,h:185},{x:400,y:505,w:260,h:18},{x:115,y:490,w:20,h:135},{x:850,y:470,w:135,h:18}],[{x:150,y:270,w:245,h:18},{x:760,y:130,w:18,h:190},{x:300,y:570,w:300,h:18},{x:500,y:105,w:145,h:18},{x:920,y:450,w:18,h:165}],[{x:130,y:150,w:18,h:210},{x:265,y:430,w:250,h:18},{x:635,y:180,w:260,h:18},{x:770,y:390,w:18,h:205},{x:410,y:630,w:230,h:18}]];return layouts[phase%layouts.length]} 
  function rayType(){let n=Math.random();if(g.t<120)return n<.55?'alpha':n<.9?'beta':'gamma';if(g.t<300)return n<.40?'alpha':n<.78?'beta':'gamma';if(g.t<480)return n<.25?'alpha':n<.62?'beta':'gamma';return n<.18?'alpha':n<.52?'beta':'gamma'}
  const specs={alpha:{r:19,speed:55,hit:19,color:'#94ff52',name:'α'},beta:{r:7,speed:175,hit:10,color:'#be77ff',name:'β'},gamma:{r:5,speed:285,hit:17,color:'#ffe970',name:'γ'}};
  function bossHomingRay(x,y,tier,a){let sp=150;return{x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,type:'gamma',hit:0,homing:true,speed:sp,travel:0,maxTravel:1020,homingTurn:1.35*(1+(tier-1)*.3),hitMult:1+(tier-1)*.35,burstRadius:38*(1+(tier-1)*.45)}}
  function spawnRay(){let side=Math.floor(Math.random()*4),px=side===0?0:side===1?W:Math.random()*W,py=side===2?0:side===3?H:Math.random()*H,a=Math.atan2(g.p.y-py,g.p.x-px);if(g.p.lvl>=4&&Math.random()<.03){g.rays.push(bossHomingRay(px,py,Math.max(1,g.bossLevel),a));return}let ty=rayType(),s=specs[ty],spd=s.speed*(1+(g.p.lvl-1)*.025);a+=(Math.random()-.5)*.35;g.rays.push({x:px,y:py,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,type:ty,hit:0});}
  function spawnItem(){let names=['라듐 시료','우라늄 광석','연구 노트','측정기','납 차폐판'],item;for(let n=0;n<40;n++){item={x:70+Math.random()*(W-140),y:80+Math.random()*(H-160),name:names[Math.floor(Math.random()*names.length)],r:10};if(!g.walls.some(w=>wallHit(item,w)))break}g.items.push(item);}
  function spawnTrap(){let trap;for(let n=0;n<40;n++){trap={x:80+Math.random()*(W-160),y:80+Math.random()*(H-160),r:26,reveal:.9};if(!g.walls.some(w=>wallHit(trap,w))&&Math.hypot(g.p.x-trap.x,g.p.y-trap.y)>150)break}g.traps.push(trap);g.trapNotice=1.8;}
  function spawnBoss(){g.bossLevel++;let tier=g.bossLevel,side=Math.floor(Math.random()*4),b={x:side===0?75:side===1?W-75:120+Math.random()*(W-240),y:side===2?75:side===3?H-75:120+Math.random()*(H-240),r:27,fire:2.2,dashHits:0,hitDash:-1,flash:0,tier};g.bosses.push(b);g.bossNotice=2.5;}
  function explode(x,y,radius=38){g.bursts.push({x,y,t:.35,radius});}
  function wallHit(o,w){return o.x+o.r>w.x&&o.x-o.r<w.x+w.w&&o.y+o.r>w.y&&o.y-o.r<w.y+w.h}
  function update(dt){let p=g.p;g.t+=dt;g.tip+=dt;g.spawn-=dt;g.itemSpawn-=dt;g.mapTimer-=dt;g.trapTimer-=dt;g.mapNotice=Math.max(0,g.mapNotice-dt);g.trapNotice=Math.max(0,g.trapNotice-dt);g.trapPassNotice=Math.max(0,g.trapPassNotice-dt);g.bossNotice=Math.max(0,g.bossNotice-dt);for(const t of g.traps)t.reveal=Math.max(0,t.reveal-dt);if(g.shield>0)g.shield-=dt;if(g.mapTimer<=0){g.mapPhase++;g.walls=makeWalls(g.mapPhase);g.mapTimer=40;g.mapNotice=3;g.items=g.items.filter(i=>!g.walls.some(w=>wallHit(i,w)));g.traps=g.traps.filter(t=>!g.walls.some(w=>wallHit(t,w)));if(g.walls.some(w=>wallHit(p,w))){p.x=W/2;p.y=H/2}}if(g.trapTimer<=0){spawnTrap();g.trapTimer=10+Math.random()*7}if(g.spawn<=0){spawnRay();g.spawn=Math.max(.12,.95-g.t*.00165)/(1+g.t/500)/g.spawnRate}if(g.itemSpawn<=0){spawnItem();g.itemSpawn=4.2+Math.random()*2.8}
    p.trapped=Math.max(0,p.trapped-dt);let dx=(keys.d?1:0)-(keys.a?1:0),dy=(keys.s?1:0)-(keys.w?1:0);if(p.trapped>0){dx=0;dy=0}let len=Math.hypot(dx,dy)||1;if(keys.shift&&p.dash<=0&& (dx||dy)){p.dashing=.18;p.dash=p.dashCd;p.dashId++}p.dash=Math.max(0,p.dash-dt);p.dashing=Math.max(0,p.dashing-dt);let speed=p.speed*(p.dashing?p.dashPower:1),nx=Math.max(p.r,Math.min(W-p.r,p.x+dx/len*speed*dt)),ny=Math.max(p.r,Math.min(H-p.r,p.y+dy/len*speed*dt));if(!g.walls.some(w=>wallHit({x:nx,y:p.y,r:p.r},w)))p.x=nx;if(!g.walls.some(w=>wallHit({x:p.x,y:ny,r:p.r},w)))p.y=ny;
    for(const t of g.traps){if(Math.hypot(p.x-t.x,p.y-t.y)<p.r+t.r&&p.trapped<=0){if(p.trapPass>0){p.trapPass--;t.dead=true;g.trapPassNotice=1}else{p.trapped=3;p.escapeHits=0;t.dead=true}}}g.traps=g.traps.filter(t=>!t.dead);for(const b of g.bosses){b.flash=Math.max(0,b.flash-dt);let a=Math.atan2(p.y-b.y,p.x-b.x),bs=34,nx=b.x+Math.cos(a)*bs*dt,ny=b.y+Math.sin(a)*bs*dt;if(!g.walls.some(w=>wallHit({x:nx,y:b.y,r:b.r},w)))b.x=nx;if(!g.walls.some(w=>wallHit({x:b.x,y:ny,r:b.r},w)))b.y=ny;if(p.dashing>0&&b.hitDash!==p.dashId&&Math.hypot(p.x-b.x,p.y-b.y)<p.r+b.r+6){b.hitDash=p.dashId;b.dashHits++;b.flash=.25;if(b.dashHits>=3){b.dead=true;explode(b.x,b.y);continue}}b.fire-=dt;if(b.fire<=0){let shoot=Math.atan2(p.y-b.y,p.x-b.x),tier=b.tier||1;g.rays.push(bossHomingRay(b.x,b.y,tier,shoot));b.fire=2.4+Math.random()*.7}}g.bosses=g.bosses.filter(b=>!b.dead);for(const r of g.rays){let s=specs[r.type];if(r.homing){let speed=r.speed,cur=Math.atan2(r.vy,r.vx),target=Math.atan2(p.y-r.y,p.x-r.x),diff=Math.atan2(Math.sin(target-cur),Math.cos(target-cur)),turn=(r.homingTurn||1.35)*(1-p.homingResist),a=cur+Math.max(-turn*dt,Math.min(turn*dt,diff));r.vx=Math.cos(a)*speed;r.vy=Math.sin(a)*speed}let mx=r.vx*dt,my=r.vy*dt;r.x+=mx;r.y+=my;if(r.homing){r.travel+=Math.hypot(mx,my);if(r.travel>=r.maxTravel){r.dead=true;explode(r.x,r.y,r.burstRadius||38)}}for(const w of g.walls)if(wallHit({...r,r:s.r},w)&&r.type==='alpha')r.dead=true;if(Math.hypot(p.x-r.x,p.y-r.y)<p.r+s.r&&r.hit<=0){let dmg=s.hit*(r.hitMult||1)*g.damageRate*(1-p.resist)*(1-p.armor);if(r.type==='gamma'){dmg*=1-p.gammaResist;if(g.shield>0)dmg*=.45}p.exposure=Math.min(100,p.exposure+dmg);r.hit=.65}}g.rays=g.rays.filter(r=>!r.dead&&r.x>-50&&r.x<W+50&&r.y>-50&&r.y<H+50);for(const burst of g.bursts)burst.t-=dt;g.bursts=g.bursts.filter(burst=>burst.t>0);
    for(const it of g.items){if(Math.hypot(p.x-it.x,p.y-it.y)<p.collectRange&&keys.e){it.dead=true;p.data++;gainXp(20);if(it.name==='납 차폐판')g.shield=Math.max(g.shield,14)}}g.items=g.items.filter(i=>!i.dead);
    if(p.exposure>=100)end('피폭 한계 도달');renderHUD(); if(g.tip>10){g.tip=0;ui.tip.textContent=tips[Math.floor(Math.random()*tips.length)]}
  }
  function gainXp(n){let p=g.p,gained=n*p.eff;p.totalXp+=gained;p.xp+=gained;if(p.xp>=p.need){p.xp-=p.need;p.need=Math.round(p.need*1.42);p.lvl++;chooseUpgrade()}}
  function chooseUpgrade(){state='upgrade';modal.classList.remove('hidden');upgradeCard.classList.remove('hidden');let pool=upgrades.filter(u=>u[0]!=='신속한 대시'||g.p.dashCdPicks<2),choices=[...pool].sort(()=>Math.random()-.5).slice(0,3),box=$('#options');box.innerHTML='';choices.forEach(u=>{let b=document.createElement('button');b.className='upgrade';b.innerHTML=`<strong>${u[0]}</strong><span>${u[1]}</span>`;b.onclick=()=>{u[2](g);g.upgradeCount++;if(g.upgradeCount%3===0)spawnBoss();state='play';modal.classList.add('hidden');upgradeCard.classList.add('hidden')};box.append(b)})}
  function score(){let p=g.p;return Math.max(0,Math.floor(g.t*100+p.totalXp*50+p.data*30-p.exposure*20+(p.lvl-1)*80))}
  function end(cause){if(state==='over')return;state='over';modal.classList.remove('hidden');overCard.classList.remove('hidden');$('#cause').textContent=cause;let p=g.p;$('#summary').innerHTML=`생존 시간 <b>${fmt(g.t)}</b> · 연구 레벨 <b>${p.lvl}</b> · 수집 자료 <b>${p.data}</b><br><br>최종 점수 <b style="font-size:28px;color:#fff4a3">${score().toLocaleString()}</b>`}
  function fmt(t){return String(Math.floor(t/60)).padStart(2,'0')+':'+String(Math.floor(t%60)).padStart(2,'0')}
  function render(){x.fillStyle='#071011';x.fillRect(0,0,W,H);x.strokeStyle='#14342f';x.lineWidth=1;for(let i=0;i<W;i+=40){x.beginPath();x.moveTo(i,0);x.lineTo(i,H);x.stroke()}for(let i=0;i<H;i+=40){x.beginPath();x.moveTo(0,i);x.lineTo(W,i);x.stroke()}
    for(const w of g.walls){x.fillStyle='#d1c39c';x.fillRect(w.x,w.y,w.w,w.h);x.fillStyle='#695f4d';x.fillRect(w.x+2,w.y+2,w.w-4,w.h-4)}
    for(const t of g.traps)if(t.reveal>0){x.strokeStyle='#ff526b';x.lineWidth=3;x.beginPath();x.arc(t.x,t.y,t.r,0,7);x.stroke();x.beginPath();x.moveTo(t.x-12,t.y-12);x.lineTo(t.x+12,t.y+12);x.moveTo(t.x+12,t.y-12);x.lineTo(t.x-12,t.y+12);x.stroke()}
    for(const b of g.bosses){x.fillStyle=b.flash>0?'#ffddf5':'#602759';x.beginPath();x.arc(b.x,b.y,b.r,0,7);x.fill();x.strokeStyle='#ff92dc';x.lineWidth=3;x.stroke();x.fillStyle='#fff0a9';x.fillRect(b.x-4,b.y-4,8,8);x.fillStyle='#fff0a9';x.font='11px monospace';x.fillText('DASH '+b.dashHits+'/3',b.x-28,b.y-35)}
    for(const it of g.items){x.fillStyle='#64d1ee';x.fillRect(it.x-7,it.y-7,14,14);x.fillStyle='#d4fcff';x.fillRect(it.x-3,it.y-3,6,6);if(Math.hypot(g.p.x-it.x,g.p.y-it.y)<52){x.fillStyle='#e8f7d8';x.font='12px monospace';x.fillText('E  '+it.name,it.x-35,it.y-17)}}
    for(const r of g.rays){let s=specs[r.type];x.fillStyle=s.color;x.beginPath();x.arc(r.x,r.y,s.r,0,7);x.fill();x.fillStyle='#071011';x.font='bold 11px monospace';x.fillText(s.name,r.x-4,r.y+4)}for(const burst of g.bursts){let maxR=burst.radius||38,radius=(1-burst.t/.35)*maxR+8;x.globalAlpha=burst.t/.35;x.strokeStyle='#ffd45c';x.lineWidth=4;x.beginPath();x.arc(burst.x,burst.y,radius,0,7);x.stroke();x.globalAlpha=1}
    if(g.shield>0){x.strokeStyle='#a9c9c2';x.lineWidth=4;x.beginPath();x.arc(g.p.x,g.p.y,34,0,7);x.stroke()}let p=g.p;x.fillStyle=p.dashing?'#fff7bc':'#f0ead7';x.fillRect(p.x-10,p.y-10,20,20);x.fillStyle='#723d5b';x.fillRect(p.x-11,p.y-13,22,7);x.fillStyle='#18252a';x.fillRect(p.x-5,p.y-4,3,3);x.fillRect(p.x+3,p.y-4,3,3);if(p.trapped>0){x.fillStyle='#ffced7';x.font='bold 16px monospace';x.fillText('TRAPPED! ENTER x'+p.escapeHits+'/10',W/2-150,75)}if(g.mapNotice>0){x.fillStyle='#d9ff9b';x.font='bold 18px monospace';x.fillText('LAB LAYOUT CHANGED',W/2-105,110)}if(g.trapNotice>0){x.fillStyle='#ff7485';x.font='bold 18px monospace';x.fillText('TRAP INSTALLED — LOCATION REVEALED',W/2-190,140)}if(g.trapPassNotice>0){x.fillStyle='#7ee8ff';x.font='bold 18px monospace';x.fillText('트랩을 무시했습니다!',W/2-95,155)}if(g.bossNotice>0){x.fillStyle='#ff9cdd';x.font='bold 20px monospace';x.fillText('MID-BOSS ARRIVED!',W/2-95,170)}
    x.fillStyle='#729084';x.font='12px monospace';x.fillText('RADIUM LAB · SECTOR 01',22,H-28);x.fillText('DASH '+(g.p.dash<=0?'READY':g.p.dash.toFixed(1)+'s'),W-145,H-28);
  }
  function renderHUD(){let p=g.p;ui.exposure.style.width=p.exposure+'%';ui.xp.style.width=(p.xp/p.need*100)+'%';ui.time.textContent=fmt(g.t);ui.level.textContent='연구 레벨 '+p.lvl;ui.score.textContent='점수 '+score().toLocaleString();ui.items.textContent=`${g.mode==='veteran'?'고인물':'초심자'} · 자료 ${p.data} · 트랩 무시 ${p.trapPass} · ${g.shield>0?'납 차폐 '+Math.ceil(g.shield)+'초':'차폐 없음'}`}
  function loop(now){let dt=Math.min(.04,(now-last)/1000||0);last=now;if(state==='play')update(dt);if(g)render();requestAnimationFrame(loop)}
  $('#health').closest('.stat').remove();
  $('#controls').insertAdjacentText('beforeend',' · ENTER x10 탈출');
  function start(mode){selectedMode=mode;reset();state='play';modal.classList.add('hidden');startCard.classList.add('hidden');hud.classList.remove('hidden');ui.tip.textContent=tips[0]}
  const startButton=$('#start');startButton.style.display='none';const modeBox=document.createElement('div');modeBox.className='options';modeBox.innerHTML='<button class="upgrade" id="beginner"><strong>초심자 모드</strong><span>방사선 생성량 30% 감소<br>피폭량 30% 감소</span></button><button class="upgrade" id="veteran"><strong>고인물 모드</strong><span>방사선 생성량 45% 증가<br>피폭량 30% 증가</span></button>';startButton.insertAdjacentElement('afterend',modeBox);$('#beginner').onclick=()=>start('beginner');$('#veteran').onclick=()=>start('veteran');$('#restart').onclick=()=>{overCard.classList.add('hidden');reset();state='play';modal.classList.add('hidden')};requestAnimationFrame(loop);
})();
</script>
